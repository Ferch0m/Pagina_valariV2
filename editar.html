<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Editar Personaje - Virelda</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="logo">
            <i class="fa-solid fa-language"></i>
            <span>Universo Virelda</span>
        </div>
        <nav class="nav-links">
            <a href="index.html">Traductor</a>
            <a href="banco.html">Banco</a>
            <a href="simulador.html">Simulador</a>
            <a href="personajes.html">Personajes</a>
            <a href="calendario.html">Calendario</a>
        </nav>
    </header>

    <main class="centered">
        <div class="container" style="max-width: 800px; text-align: left;">
            <h1 id="titulo-editar"><i class="fa-solid fa-user-pen"></i> Editar Info de Personaje</h1>

            <div style="display: grid; grid-template-columns: 1fr; gap: 20px;">

                <!-- Info Básica y Foto -->
                <div
                    style="display: flex; gap: 20px; flex-wrap: wrap; background: #ffffff; padding: 20px; border-radius: 12px; border: 1px solid #84934A;">
                    <div style="text-align: center;">
                        <img id="preview-img" src=""
                            style="width: 150px; height: 150px; object-fit: cover; border-radius: 12px; border: 3px solid #656D3F; margin-bottom: 10px;">
                        <br>
                        <label style="font-size: 14px; font-weight: bold; cursor:pointer; color: #656D3F;">
                            Cambiar Imagen 📷
                            <input type="file" id="edit-img" accept="image/*" style="display: none;">
                        </label>
                    </div>

                    <div style="flex-grow: 1; display: flex; flex-direction: column; gap: 10px;">
                        <div style="display: flex; gap: 10px;">
                            <div style="flex: 2;">
                                <label>Nombre:</label>
                                <input type="text" id="edit-nombre" style="width: 95%;">
                            </div>
                            <div style="flex: 1.5;">
                                <label>Arquetipo:</label>
                                <input type="text" id="edit-arquetipo" style="width: 90%;">
                            </div>
                        </div>

                        <!-- Fila enlazada: Edad, Día, Mes, Año -->
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px; flex-wrap: wrap;">
                            <label style="color: #656D3F; font-weight: bold;">
                                <i class="fa-solid fa-calendar-day"></i> Fecha de Nacimiento y Edad (Año 3705)
                            </label>
                            <label style="font-size: 14px; cursor: pointer; color: #3b2f2f;">
                                <input type="checkbox" id="edit-desvincular"> Desvincular cálculo automático
                            </label>
                        </div>

                        <div style="display: flex; gap: 10px; margin-top: 5px;">
                            <select id="edit-dia" style="flex: 1;">
                                <option value="">Día</option>
                            </select>
                            <select id="edit-mes" style="flex: 2;">
                                <option value="">Mes</option>
                                <option value="1">Enero</option>
                                <option value="2">Febrero</option>
                                <option value="3">Marzo</option>
                                <option value="4">Abril</option>
                                <option value="5">Mayo</option>
                                <option value="6">Junio</option>
                                <option value="7">Julio</option>
                                <option value="8">Agosto</option>
                                <option value="9">Septiembre</option>
                                <option value="10">Octubre</option>
                            </select>
                            <input type="number" id="edit-anio" placeholder="Año Nac." style="flex: 1.5;">
                            <input type="number" id="edit-edad" placeholder="Edad" style="flex: 1;">
                        </div>
                        <p
                            style="margin: 5px 0 0 0; font-size: 15px; background: #e0d5c1; padding: 8px; border-radius: 6px;">
                            <strong>Signo Zodiacal:</strong> <span id="edit-signo" style="color: #656D3F;">-</span>
                        </p>
                    </div>
                </div>

                <!-- Secciones de Texto Largo -->
                <label><strong><i class="fa-solid fa-handshake"></i> Conexiones (Familia, Amigos,
                        Rivales):</strong></label>
                <textarea id="edit-conexiones" rows="4" placeholder="Ej: Madre: ... Mejor amigo: ..."></textarea>

                <label><strong><i class="fa-solid fa-dna"></i> Fisiología y Apariencia:</strong></label>
                <textarea id="edit-apariencia" rows="4" placeholder="Rasgos físicos, ropa, marcas..."></textarea>

                <label><strong><i class="fa-solid fa-brain"></i> Personalidad y Gustos:</strong></label>
                <textarea id="edit-personalidad" rows="4"
                    placeholder="Miedos, deseos, estética, qué le gusta..."></textarea>

                <label><strong><i class="fa-solid fa-star"></i> Habilidades y Magia:</strong></label>
                <textarea id="edit-habilidades" rows="4" placeholder="Combate, hechizos, idiomas..."></textarea>

                <label><strong><i class="fa-solid fa-file-lines"></i> Historia:</strong></label>
                <textarea id="edit-historia" rows="6"
                    placeholder="Lugar de nacimiento, infancia, eventos principales..."></textarea>

                <label><strong><i class="fa-solid fa-book-open"></i> Datos Curiosos y Secretos:</strong></label>
                <textarea id="edit-curiosidades" rows="4" placeholder="Secretos, anécdotas raras..."></textarea>

                <!-- Botones -->
                <div style="display: flex; justify-content: space-between; margin-top: 20px;">
                    <button id="btn-guardar-edit"><i class="fa-solid fa-floppy-disk"></i> Guardar y Volver</button>
                    <button id="btn-eliminar" class="btn-danger"><i class="fa-solid fa-trash"></i> Eliminar
                        Personaje</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>Creado con Culo 🩷</p>
    </footer>
    <script src="js/editar.js"></script>
</body>

</html>
