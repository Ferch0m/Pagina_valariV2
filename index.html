<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Traductor Valari</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="logo">
            <i class="fa-solid fa-language"></i>
            <span>Universo Virelda</span>
        </div>
        <nav class="nav-links">
            <a href="index.html">Traductor</a>
            <a href="banco.html">Banco</a>
            <a href="simulador.html">Simulador</a>
            <a href="personajes.html">Personajes</a>
            <a href="calendario.html">Calendario</a>
        </nav>
    </header>

    <!-- Contenedor principal -->
    <main class="centered">
        <div class="container" style="max-width: 1000px;">
            <h1><i class="fa-solid fa-book-open"></i> Traductor Valari</h1>

            <!-- Selección de modo -->
            <div class="options" style="margin-bottom: 20px; text-align: left;">
                <label for="mode" style="font-weight: bold; color: #656D3F; font-size: 18px;"><i
                        class="fa-solid fa-exchange-alt"></i> Modo de traducción:</label>
                <select id="mode"
                    style="width: 100%; box-sizing: border-box; padding: 16px; font-size: 18px; margin-top: 10px; border-radius: 10px; cursor: pointer;">
                    <option value="to_valari">Inglés ➝ Valari</option>
                    <option value="from_valari">Valari ➝ Inglés</option>
                </select>
            </div>

            <!-- Caja de entrada -->
            <textarea id="inputText" placeholder="Escribe aquí tu texto..."></textarea>

            <!-- Botones -->
            <div id="buttons" style="justify-content: flex-start;">
                <button id="translateBtn"><i class="fa-solid fa-star"></i> Traducir</button>
                <a href="banco.html" class="btn-banco" style="text-decoration: none;">
                    <button style="margin: 0; background: #84934A; color: #3b2f2f;"><i class="fa-solid fa-book"></i>
                        Banco de palabras</button>
                </a>
            </div>

            <!-- Resultado -->
            <h2 style="text-align: left; margin-top: 30px;"><i class="fa-solid fa-check"></i> Resultado:</h2>
            <div id="outputText"
                style="margin-top: 15px; padding: 16px; background: #ffffff; border-radius: 10px; min-height: 60px; font-size: 18px; border: 1px solid #84934A; text-align: left;">
            </div>

            <!-- Historial: Cabecera y Botón Borrar -->
            <div style="display: flex; justify-content: space-between; align-items: center; border-top: 2px solid #84934A; padding-top: 30px; margin-top: 30px; flex-wrap: wrap; gap: 15px;">
                <h2 style="margin: 0; text-align: left;"><i class="fa-solid fa-clock-rotate-left"></i> Historial de Traducciones</h2>
                <button id="clearHistory" class="btn-danger" style="margin: 0;"><i class="fa-solid fa-trash-can"></i> Borrar Todo</button>
            </div>
            
            <!-- Contenedor Grid para las dos tablas -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px;">
                
                <!-- Tabla 1: Inglés -> Valari -->
                <div>
                    <h3 style="margin-bottom: 10px; color: #4b3832; text-align: left;"><i class="fa-solid fa-arrow-right-to-bracket"></i> Inglés ➝ Valari</h3>
                    <div class="table-wrapper" style="margin-top: 0;">
                        <table style="min-width: 100%;">
                            <thead>
                                <tr>
                                    <th>Inglés</th>
                                    <th>Valari</th>
                                    <th style="width: 50px; text-align: center;"><i class="fa-solid fa-bolt"></i></th>
                                </tr>
                            </thead>
                            <tbody id="tabla-to-valari">
                                <!-- Traducciones Inglés -> Valari -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Tabla 2: Valari -> Inglés -->
                <div>
                    <h3 style="margin-bottom: 10px; color: #4b3832; text-align: left;"><i class="fa-solid fa-arrow-right-from-bracket"></i> Valari ➝ Inglés</h3>
                    <div class="table-wrapper" style="margin-top: 0;">
                        <table style="min-width: 100%;">
                            <thead>
                                <tr>
                                    <th>Valari</th>
                                    <th>Inglés</th>
                                    <th style="width: 50px; text-align: center;"><i class="fa-solid fa-bolt"></i></th>
                                </tr>
                            </thead>
                            <tbody id="tabla-from-valari">
                                <!-- Traducciones Valari -> Inglés -->
                            </tbody>
                        </table>
                    </div>
                </div>
                
            </div>
        </div>
    </main>

    <footer>
        <p>Creado con Culo 🩷</p>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
