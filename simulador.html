<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Simulador - Virelda</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="logo">
            <i class="fa-solid fa-language"></i>
            <span>Universo Virelda</span>
        </div>
        <nav class="nav-links">
            <a href="index.html">Traductor</a>
            <a href="banco.html">Banco</a>
            <a href="simulador.html">Simulador</a>
            <a href="personajes.html">Personajes</a>
            <a href="calendario.html">Calendario</a>
        </nav>
    </header>

    <main class="centered">
        <div class="container" style="max-width: 800px;">
            <h1><i class="fa-solid"></i> Simulador de fecha de nacimiento</h1>

            <div style="text-align: left; margin-bottom: 30px; margin-top: 20px;">

                <label style="font-weight: bold; color: #656D3F; font-size: 18px;"><i class="fa-solid fa-user-pen"></i>
                    Nombre del personaje:</label>
                <input type="text" id="sim-nombre" placeholder="Ej: Tavrek Collins"
                    style="width: 100%; box-sizing: border-box; padding: 16px; font-size: 18px; margin: 10px 0 20px 0; border-radius: 10px;">

                <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 200px;">
                        <label style="font-weight: bold; color: #656D3F; font-size: 18px;"><i
                                class="fa-solid fa-hourglass-half"></i> Edad:</label>
                        <input type="number" id="sim-edad" placeholder="Ej: 20"
                            style="width: 100%; box-sizing: border-box; padding: 16px; font-size: 18px; margin: 10px 0; border-radius: 10px;">
                    </div>

                    <div style="flex: 1; min-width: 200px;">
                        <label style="font-weight: bold; color: #656D3F; font-size: 18px;"><i
                                class="fa-solid fa-calendar-days"></i> Mes de nacimiento:</label>
                        <select id="sim-mes"
                            style="width: 100%; box-sizing: border-box; padding: 16px; font-size: 18px; margin: 10px 0; border-radius: 10px; cursor: pointer;">
                            <option value="">Mes</option>
                            <option value="1">Enero</option>
                            <option value="2">Febrero</option>
                            <option value="3">Marzo</option>
                            <option value="4">Abril</option>
                            <option value="5">Mayo</option>
                            <option value="6">Junio</option>
                            <option value="7">Julio</option>
                            <option value="8">Agosto</option>
                            <option value="9">Septiembre</option>
                            <option value="10">Octubre</option>
                        </select>
                    </div>
                </div>

                <div id="buttons" style="justify-content: flex-start; margin-top: 15px;">
                    <button onclick="simular()"><i class="fa-solid fa-star"></i> Calcular y Guardar</button>
                </div>
            </div>

            <!-- Tabla de Historial con el nuevo botón general -->
            <div
                style="display: flex; justify-content: space-between; align-items: center; border-top: 2px solid #84934A; padding-top: 30px; margin-top: 20px; flex-wrap: wrap; gap: 15px;">
                <h2 style="margin: 0; text-align: left;"><i class="fa-solid fa-list"></i> Historial de Simulaciones</h2>
                <button onclick="limpiarHistorial()" class="btn-danger"><i class="fa-solid fa-trash-can"></i> Borrar
                    Todo</button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Edad</th>
                            <th>Año de Nacimiento</th>
                            <th>Signo Zodiacal</th>
                            <th>Representa</th>
                            <th>Acción</th> <!-- Nueva columna -->
                        </tr>
                    </thead>
                    <tbody id="tabla-historial">
                        <!-- Los resultados se inyectan aquí -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer>
        <p>Creado con Culo 🩷</p>
    </footer>
    <script src="js/simulador.js"></script>
</body>

</html>
